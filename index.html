<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏓 Ping Pong — Pro Dashboard</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff9800">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041168.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0e0e0e; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
      --primary: #ff9800; --primary-dim: #3d2b1a; --red: #ff5252; --red-dim: #3d1a1a;
      --text: #f0f0f0; --muted: #888; --radius: 12px; --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
    header .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--primary); }
    .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
    .main-grid { display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; align-items: start; }
    .top-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .metric { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; text-align: center; }
    .metric-val { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .metric-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
    .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 12px; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--muted); border: none; border-radius: var(--radius-sm); transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .tab.active { background: var(--primary); color: #000; font-weight: 600; }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
    .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; color: var(--muted); margin-bottom: 1rem; }
    .input-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    input[type=text] { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 12px; outline: none; font-family: 'DM Sans', sans-serif; }
    input[type=text]:focus { border-color: var(--primary); }
    .btn { padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--text); transition: all .15s; font-family: 'DM Sans', sans-serif; display: inline-flex; align-items: center; justify-content: center; }
    .btn.primary { background: var(--primary); color: #000; border-color: var(--primary); }
    .btn.danger { background: var(--red-dim); color: var(--red); border-color: var(--red); }
    .btn.ghost { background: transparent; border-color: transparent; color: var(--muted); font-size: 11px; }
    .btn.full { width: 100%; }
    .scoreboard { display: grid; grid-template-columns: 1fr 40px 1fr; align-items: center; text-align: center; gap: 10px; }
    .score-area { cursor: pointer; padding: 30px 10px; border-radius: var(--radius); background: rgba(255,255,255,0.02); border: 1px solid transparent; transition: all 0.1s ease; user-select: none; }
    .score-area:active { background: var(--primary-dim); transform: scale(0.98); border-color: var(--primary); }
    .score-num { font-family: 'Bebas Neue', sans-serif; font-size: 80px; line-height: 1; color: var(--muted); margin: 10px 0; }
    .score-num.leading { color: var(--primary); }
    .tap-hint { font-size: 9px; color: var(--border); text-transform: uppercase; letter-spacing: 1px; }
    @keyframes pointPop { 0% { transform: scale(1); } 50% { transform: scale(1.1); color: #fff; } 100% { transform: scale(1); } }
    .point-anim { animation: pointPop 0.3s ease-out; }
    .prog-wrap { display: flex; gap: 4px; margin-bottom: 1.5rem; }
    .prog-dot { flex: 1; height: 6px; border-radius: 3px; background: var(--surface2); transition: background 0.3s; }
    .prog-dot.p1 { background: var(--primary); }
    .prog-dot.p2 { background: #7c7cf5; }
    .queue-list { list-style: none; }
    .queue-item { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .q-num { width: 26px; height: 26px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
    .q-name { flex: 1; font-size: 14px; font-weight: 500; }
    .rank-table { width: 100%; border-collapse: collapse; }
    .rank-table th { text-align: left; color: var(--muted); font-size: 11px; padding: 12px; border-bottom: 1px solid var(--border); text-transform: uppercase; }
    .rank-table td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
    @media (min-width: 851px) { .tab-fila-btn { display: none; } }
    @media (max-width: 850px) { .main-grid { grid-template-columns: 1fr; } .sidebar-queue { display: none; } .top-stats { grid-template-columns: 1fr 1fr; } .score-num { font-size: 60px; } }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; backdrop-filter: blur(5px); }
    .winner-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--surface); border: 2px solid var(--primary); border-radius: var(--radius); padding: 2.5rem; text-align: center; z-index: 201; width: 320px; }
  </style>
</head>
<body>
  <header><div class="logo">🏓 PINGPONG PRO</div><div style="margin-left:auto; font-size: 12px; color: var(--muted)" id="date-badge"></div></header>
  <div class="container">
    <div class="top-stats">
      <div class="metric"><div class="metric-val" id="ts-partidas">0</div><div class="metric-lbl">Partidas</div></div>
      <div class="metric"><div class="metric-val" id="ts-jogadores">0</div><div class="metric-lbl">Jogadores</div></div>
      <div class="metric" style="border-color: var(--primary)"><div class="metric-val" id="ts-lider">—</div><div class="metric-lbl">Líder (Taxa)</div></div>
      <div class="metric"><div class="metric-val" id="ts-top-winner">—</div><div class="metric-lbl">Mais Vitórias</div></div>
    </div>
    <div class="main-grid">
      <main>
        <div class="tabs">
          <button class="tab tab-fila-btn" onclick="showTab('fila',this)">👥 Fila</button>
          <button class="tab active" id="tab-btn-placar" onclick="showTab('placar',this)">📊 Placar</button>
          <button class="tab" id="tab-btn-ranking" onclick="showTab('ranking',this)">🏆 Ranking</button>
          <button class="tab" onclick="showTab('historico',this)">📜 Histórico</button>
        </div>
        <div id="tab-fila" class="section">
          <div class="card">
            <div class="card-title">Entrar na Partida</div>
            <div class="input-row">
              <input type="text" id="p-input-mob" placeholder="Nome do jogador..." onkeydown="if(event.key==='Enter')addToQueue('mob')">
              <button class="btn primary" onclick="addToQueue('mob')">Adicionar</button>
            </div>
            <ul class="queue-list" id="q-list-mob"></ul>
            <button id="start-mob" class="btn primary full" style="display:none; margin-top:15px" onclick="startMatch()">▶ Iniciar Partida</button>
            <button class="btn ghost full" style="margin-top: 30px;" onclick="resetDay()">♻ Resetar Tudo</button>
          </div>
        </div>
        <div id="tab-placar" class="section active">
          <div id="no-match" class="card" style="text-align:center; padding: 4rem 1rem; color: var(--muted);">Aguardando jogadores...</div>
          <div id="match-active" style="display:none">
            <div class="card">
              <div class="prog-wrap" id="prog-wrap"></div>
              <div class="scoreboard">
                <div class="score-area" onclick="handlePoint(0)"><div class="metric-lbl" id="p1name">P1</div><div class="score-num" id="p1score">0</div><div class="tap-hint">Toque aqui</div></div>
                <div style="font-family:'Bebas Neue'; color:var(--border); font-size:24px">VS</div>
                <div class="score-area" onclick="handlePoint(1)"><div class="metric-lbl" id="p2name">P2</div><div class="score-num" id="p2score">0</div><div class="tap-hint">Toque aqui</div></div>
              </div>
              <div style="display: flex; gap: 10px; margin-top: 2rem;">
                  <button class="btn full" style="flex: 1;" onclick="undo()">↩ Desfazer</button>
                  <button class="btn danger full" style="flex: 1;" onclick="cancelMatch()">✕ Cancelar</button>
              </div>
            </div>
          </div>
        </div>
        <div id="tab-ranking" class="section">
          <div class="card">
            <table class="rank-table">
              <thead><tr><th>Pos</th><th>Jogador</th><th>V/D</th><th>%</th><th>Ações</th></tr></thead>
              <tbody id="rank-body"></tbody>
            </table>
          </div>
        </div>
        <div id="tab-historico" class="section"><div class="card" id="hist-list"></div></div>
      </main>
      <aside class="sidebar-queue">
        <div class="card" style="position: sticky; top: 100px;">
          <div class="card-title">Fila de Espera</div>
          <div class="input-row"><input type="text" id="p-input-side" placeholder="Nome..." onkeydown="if(event.key==='Enter')addToQueue('side')"><button class="btn primary" onclick="addToQueue('side')">+</button></div>
          <ul class="queue-list" id="q-list-side"></ul>
          <button id="start-side" class="btn primary full" style="display:none; margin-top:15px" onclick="startMatch()">▶ Iniciar Partida</button>
          <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
          <button class="btn ghost full" onclick="resetDay()">♻ Resetar Tudo</button>
        </div>
      </aside>
    </div>
  </div>
  <div class="overlay" id="overlay"></div>
  <div class="winner-modal" id="winner-modal">
    <div style="font-size:50px; margin-bottom: 10px">🏆</div>
    <div class="card-title" id="win-name" style="color:var(--primary); font-size:28px; margin-bottom: 5px"></div>
    <div class="metric-lbl" id="win-score" style="margin-bottom:25px; font-size: 14px"></div>
    <button class="btn primary full" onclick="closeWinner()">Próxima Partida</button>
  </div>

  <script>
    const WINNING_SCORE = 5; const STORAGE_KEY = 'pingpong_v4';
    let state = { queue: [], match: null, ranking: {}, history: [], lastState: null };
    
    function init() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) state = JSON.parse(saved);
      document.getElementById('date-badge').textContent = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
      refreshAll();
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    }

    function refreshAll() { updateTopStats(); renderQueue(); renderMatch(); renderRanking(); renderHistory(); }
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); updateTopStats(); }

    function updateTopStats() {
      const players = Object.keys(state.ranking);
      document.getElementById('ts-partidas').textContent = state.history.length;
      document.getElementById('ts-jogadores').textContent = players.length;
      if (players.length > 0) {
        const sortedByRate = [...players].sort((a,b) => {
            const rA = state.ranking[a].w / (state.ranking[a].w + state.ranking[a].d || 1);
            const rB = state.ranking[b].w / (state.ranking[b].w + state.ranking[b].d || 1);
            return rB - rA;
        });
        document.getElementById('ts-lider').textContent = sortedByRate[0];
        const sortedByWins = [...players].sort((a,b) => state.ranking[b].w - state.ranking[a].w);
        document.getElementById('ts-top-winner').textContent = sortedByWins[0];
      } else { document.getElementById('ts-lider').textContent = "—"; document.getElementById('ts-top-winner').textContent = "—"; }
    }

    function resetDay() { if(confirm("Resetar tudo?")) { state = { queue: [], match: null, ranking: {}, history: [], lastState: null }; localStorage.removeItem(STORAGE_KEY); refreshAll(); showTab('fila', document.querySelector('.tab-fila-btn')); } }
    
    function showTab(id, btn) { 
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); 
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); 
        document.getElementById('tab-' + id).classList.add('active'); 
        if (btn) btn.classList.add('active'); 
        if(id==='ranking') renderRanking(); 
        if(id==='historico') renderHistory(); 
    }

    function addToQueue(src) { 
        const input = document.getElementById(src === 'mob' ? 'p-input-mob' : 'p-input-side'); 
        const name = input.value.trim().toUpperCase(); 
        if (!name || state.queue.includes(name)) return; 
        if (state.match && (state.match.p1 === name || state.match.p2 === name)) return;
        state.queue.push(name); 
        input.value = ""; 
        save(); renderQueue(); 
    }

    function renderQueue() { 
        const listHtml = state.queue.map((name, i) => `
            <li class="queue-item">
                <div class="q-num">${i + 1}</div>
                <span class="q-name">${name}</span>
                <button class="btn" style="padding:4px 10px; font-size:10px" onclick="removeFromQueue(${i})">✕</button>
            </li>
        `).join(''); 
        document.getElementById('q-list-mob').innerHTML = listHtml || '<li style="text-align:center; padding:20px; color:var(--muted)">Fila vazia</li>'; 
        document.getElementById('q-list-side').innerHTML = listHtml || '<li style="text-align:center; padding:20px; color:var(--muted)">Fila vazia</li>'; 
        const minNeeded = state.match ? 1 : 2; 
        const canStart = state.queue.length >= minNeeded; 
        document.getElementById('start-mob').style.display = canStart ? 'block' : 'none'; 
        document.getElementById('start-side').style.display = canStart ? 'block' : 'none'; 
    }

    function removeFromQueue(index) { 
        state.queue.splice(index, 1); 
        save(); 
        renderQueue(); 
    }

    function startMatch() { 
        if (!state.match) { 
            state.match = { p1: state.queue[0], p2: state.queue[1], s1: 0, s2: 0 }; 
            state.queue.splice(0, 2); 
        } else { 
            state.match.p2 = state.queue[0]; 
            state.match.s1 = 0; 
            state.match.s2 = 0; 
            state.queue.splice(0, 1); 
        } 
        state.lastState = null; 
        save(); renderMatch(); 
        showTab('placar', document.getElementById('tab-btn-placar')); 
    }

    function renderMatch() { 
        const noMatch = document.getElementById('no-match'); 
        const active = document.getElementById('match-active'); 
        if (!state.match) { noMatch.style.display = 'block'; active.style.display = 'none'; return; } 
        noMatch.style.display = 'none'; active.style.display = 'block'; 
        document.getElementById('p1name').textContent = state.match.p1; 
        document.getElementById('p2name').textContent = state.match.p2; 
        document.getElementById('p1score').textContent = state.match.s1; 
        document.getElementById('p2score').textContent = state.match.s2; 
        document.getElementById('p1score').className = 'score-num' + (state.match.s1 > state.match.s2 ? ' leading' : ''); 
        document.getElementById('p2score').className = 'score-num' + (state.match.s2 > state.match.s1 ? ' leading' : ''); 
        const dots = document.getElementById('prog-wrap'); 
        dots.innerHTML = Array.from({length: WINNING_SCORE}, (_, i) => `<div class="prog-dot ${i < state.match.s1 ? 'p1' : ''}"></div>`).join('') + '<div style="width:20px"></div>' + Array.from({length: WINNING_SCORE}, (_, i) => `<div class="prog-dot ${i < state.match.s2 ? 'p2' : ''}"></div>`).join(''); 
    }

    function handlePoint(playerIndex) { 
        if (!state.match) return; 
        state.lastState = JSON.parse(JSON.stringify(state.match)); 
        if (playerIndex === 0) { state.match.s1++; animate('p1score'); } 
        else { state.match.s2++; animate('p2score'); } 
        if (state.match.s1 >= WINNING_SCORE || state.match.s2 >= WINNING_SCORE) finishMatch(); 
        else { save(); renderMatch(); } 
    }

    function undo() { 
        if (state.lastState) { state.match = JSON.parse(JSON.stringify(state.lastState)); state.lastState = null; save(); renderMatch(); } 
    }

    function animate(id) { 
        const el = document.getElementById(id); 
        el.classList.remove('point-anim'); 
        void el.offsetWidth; 
        el.classList.add('point-anim'); 
    }

    function finishMatch() { 
        const m = state.match; 
        const winner = m.s1 > m.s2 ? m.p1 : m.p2; 
        const loser = m.s1 > m.s2 ? m.p2 : m.p1; 
        state.history.unshift({ win: winner, score: `${m.s1} x ${m.s2}`, players: `${m.p1} vs ${m.p2}`, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }); 
        if (!state.ranking[winner]) state.ranking[winner] = { w: 0, d: 0 }; 
        if (!state.ranking[loser]) state.ranking[loser] = { w: 0, d: 0 }; 
        state.ranking[winner].w++; state.ranking[loser].d++; 
        
        // Vencedor permanece como P1
        state.match = { p1: winner, p2: "Aguardando...", s1: 0, s2: 0 }; 
        save(); 

        document.getElementById('win-name').textContent = winner; 
        document.getElementById('win-score').textContent = `Placar final: ${m.s1} a ${m.s2}`; 
        document.getElementById('winner-modal').style.display = 'block'; 
        document.getElementById('overlay').style.display = 'block'; 
    }

    function closeWinner() { 
        document.getElementById('winner-modal').style.display = 'none'; 
        document.getElementById('overlay').style.display = 'none'; 
        
        // Tenta iniciar a próxima partida mantendo o vencedor
        if (state.queue.length > 0) {
            startMatch(); 
        } else {
            // Se não houver fila, o placar fica "limpo" com o vencedor aguardando
            renderMatch();
        }
    }

    function cancelMatch() { 
        if (confirm("Cancelar?")) { 
            state.match = null; save(); renderMatch(); renderQueue(); 
        } 
    }

    function removePlayer(name) { 
        if (confirm(`Excluir ${name}?`)) { 
            delete state.ranking[name]; 
            state.queue = state.queue.filter(p => p !== name); 
            if (state.match && (state.match.p1 === name || state.match.p2 === name)) state.match = null; 
            save(); refreshAll(); 
        } 
    }

    function renderRanking() { 
        const players = Object.keys(state.ranking); 
        const sorted = players.sort((a,b) => {
            const rA = state.ranking[a].w / (state.ranking[a].w + state.ranking[a].d || 1);
            const rB = state.ranking[b].w / (state.ranking[b].w + state.ranking[b].d || 1);
            return rB - rA || state.ranking[b].w - state.ranking[a].w;
        });
        document.getElementById('rank-body').innerHTML = sorted.map((name, i) => { 
            const r = state.ranking[name]; 
            const rate = Math.round((r.w / (r.w + r.d || 1)) * 100); 
            return `<tr><td>${i < 3 ? ['🥇','🥈','🥉'][i] : i + 1}</td><td><b>${name}</b></td><td>${r.w}V - ${r.d}D</td><td style="color:${rate >= 50 ? 'var(--primary)' : 'var(--red)'}">${rate}%</td><td><button class="btn danger" style="padding:4px 8px; font-size:10px" onclick="removePlayer('${name}')">Excluir</button></td></tr>`; 
        }).join('') || '<tr><td colspan="5" style="text-align:center; padding:20px; color:var(--muted)">Sem dados</td></tr>'; 
    }

    function renderHistory() { 
        document.getElementById('hist-list').innerHTML = state.history.map(h => `<div style="padding:15px 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center"><div><div style="font-size:11px; color:var(--muted); margin-bottom:4px">${h.time}</div><div style="font-size:14px; font-weight:600">${h.players}</div><div style="font-size:11px; color:var(--primary)">🏆 ${h.win}</div></div><div style="font-family:'Bebas Neue'; font-size:26px">${h.score}</div></div>`).join('') || '<div style="text-align:center; padding:20px; color:var(--muted)">Vazio</div>'; 
    }

    init();
  </script>
</body>
</html>

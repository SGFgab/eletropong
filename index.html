<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏓 Ping Pong Pro — Live</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff9800">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/@liveblocks/client@latest"></script>

  <style>
    :root {
      --bg: #0e0e0e; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
      --primary: #ff9800; --primary-dim: #3d2b1a; --red: #ff5252; --red-dim: #3d1a1a;
      --text: #f0f0f0; --muted: #888; --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
    header .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--primary); }
    .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
    .main-grid { display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; align-items: start; }
    .top-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .metric { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
    .metric-val { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--primary); }
    .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 12px; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--muted); border: none; border-radius: 8px; transition: all .15s; }
    .tab.active { background: var(--primary); color: #000; font-weight: 600; }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
    .scoreboard { display: grid; grid-template-columns: 1fr 40px 1fr; align-items: center; text-align: center; }
    .score-area { cursor: pointer; padding: 30px 10px; border-radius: var(--radius); transition: all 0.1s; }
    .score-area:active { background: var(--primary-dim); transform: scale(0.98); }
    .score-num { font-family: 'Bebas Neue', sans-serif; font-size: 80px; line-height: 1; color: var(--muted); }
    .score-num.leading { color: var(--primary); }
    .btn { padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); width: 100%; display: block; margin-top: 10px; text-align: center; text-decoration: none; }
    .btn.primary { background: var(--primary); color: #000; border-color: var(--primary); }
    .queue-list { list-style: none; }
    .queue-item { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .q-name { flex: 1; font-size: 14px; }
    .rank-table { width: 100%; border-collapse: collapse; }
    .rank-table td, .rank-table th { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
    @media (max-width: 850px) { .main-grid { grid-template-columns: 1fr; } .sidebar-queue { display: none; } .top-stats { grid-template-columns: 1fr 1fr; } }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; }
    .winner-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--surface); border: 2px solid var(--primary); border-radius: var(--radius); padding: 2.5rem; text-align: center; z-index: 201; width: 300px; }
    #sync-status { font-size: 10px; color: var(--primary); margin-left: 10px; opacity: 0.7; }
  </style>
</head>
<body>
  <header>
    <div class="logo">🏓 PINGPONG LIVE</div>
    <div id="sync-status">Conectando...</div>
  </header>
  <div class="container">
    <div class="top-stats">
      <div class="metric"><div class="metric-val" id="ts-partidas">0</div><div class="metric-lbl">Partidas</div></div>
      <div class="metric"><div class="metric-val" id="ts-jogadores">0</div><div class="metric-lbl">Jogadores</div></div>
      <div class="metric"><div class="metric-val" id="ts-lider">—</div><div class="metric-lbl">Líder</div></div>
      <div class="metric"><div class="metric-val" style="color:var(--primary)">●</div><div class="metric-lbl">Online</div></div>
    </div>
    <div class="main-grid">
      <main>
        <div class="tabs">
          <button class="tab" onclick="showTab('fila',this)">👥 Fila</button>
          <button class="tab active" onclick="showTab('placar',this)">📊 Placar</button>
          <button class="tab" onclick="showTab('ranking',this)">🏆 Ranking</button>
        </div>
        <div id="tab-fila" class="section">
          <div class="card">
            <input type="text" id="p-input-mob" placeholder="Nome..." style="width:100%; padding:12px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:8px">
            <button class="btn primary" onclick="addToQueue('mob')">Adicionar à Fila</button>
            <ul id="q-list-mob" class="queue-list" style="margin-top:20px"></ul>
          </div>
        </div>
        <div id="tab-placar" class="section active">
          <div id="no-match" class="card" style="text-align:center; padding:2rem; color:var(--muted)">Aguardando início...</div>
          <div id="match-active" style="display:none">
            <div class="card">
              <div class="scoreboard">
                <div class="score-area" onclick="handlePoint(0)"><div id="p1name" style="font-size:12px; color:var(--muted)">P1</div><div class="score-num" id="p1score">0</div></div>
                <div style="color:var(--border)">VS</div>
                <div class="score-area" onclick="handlePoint(1)"><div id="p2name" style="font-size:12px; color:var(--muted)">P2</div><div class="score-num" id="p2score">0</div></div>
              </div>
              <button class="btn" onclick="undo()">↩ Corrigir Ponto</button>
              <button class="btn" style="color:var(--red)" onclick="cancelMatch()">✕ Cancelar Partida</button>
            </div>
          </div>
        </div>
        <div id="tab-ranking" class="section">
          <div class="card"><table class="rank-table"><tbody id="rank-body"></tbody></table></div>
        </div>
      </main>
      <aside class="sidebar-queue">
        <div class="card">
          <div class="card-title">Fila Geral</div>
          <input type="text" id="p-input-side" placeholder="Nome..." style="width:100%; padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:8px">
          <button class="btn primary" onclick="addToQueue('side')">+</button>
          <ul id="q-list-side" class="queue-list" style="margin-top:15px"></ul>
          <button id="start-btn" class="btn primary" style="display:none" onclick="startMatch()">▶ Iniciar Próxima</button>
          <button class="btn ghost" onclick="resetDay()">♻ Limpar Tudo</button>
        </div>
      </aside>
    </div>
  </div>
  <div class="overlay" id="overlay"></div>
  <div class="winner-modal" id="winner-modal">
    <h2 id="win-name" style="color:var(--primary)"></h2>
    <p id="win-score" style="margin:10px 0"></p>
    <button class="btn primary" onclick="closeWinner()">Próxima Partida</button>
  </div>

  <script>
    // --- CONFIGURAÇÃO LIVEBLOCKS ---
    const client = Liveblocks.createClient({ publicApiKey: "pk_dev_oGdUGTXkcrdSJVXIpePPtgN9hEvD3x3a7AMySqdj4lu34iVlNSFD9rMEFNLuyQc8" });
    const { room, leave } = client.enterRoom("mesa-ping-pong-principal", {
      initialStorage: {
        state: { queue: [], match: null, ranking: {}, history: [] }
      }
    });

    let state = { queue: [], match: null, ranking: {}, history: [] };

    // Sincronização em Tempo Real
    room.subscribe("storage", (newStorage) => {
      state = newStorage.root.get("state");
      document.getElementById('sync-status').textContent = "● Sincronizado";
      refreshUI();
    });

    function updateStorage() {
      room.getStorage().then((storage) => {
        storage.root.set("state", state);
      });
    }

    // --- LÓGICA DO JOGO ---
    function refreshUI() {
      updateTopStats();
      renderQueue();
      renderMatch();
      renderRanking();
    }

    function showTab(id, btn) { 
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); 
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); 
      document.getElementById('tab-'+id).classList.add('active'); 
      btn.classList.add('active'); 
    }

    function updateTopStats() {
      const p = Object.keys(state.ranking);
      document.getElementById('ts-partidas').textContent = state.history.length;
      document.getElementById('ts-jogadores').textContent = p.length;
      if(p.length) document.getElementById('ts-lider').textContent = p.sort((a,b) => state.ranking[b].w - state.ranking[a].w)[0];
    }

    function addToQueue(src) {
      const inp = document.getElementById(src === 'mob' ? 'p-input-mob' : 'p-input-side');
      const name = inp.value.trim().toUpperCase();
      if(name && !state.queue.includes(name)) { 
        state.queue.push(name); 
        inp.value = ''; 
        updateStorage(); 
      }
    }

    function renderQueue() {
      const html = state.queue.map((n, i) => `<li class="queue-item"><span>${i+1}. ${n}</span><button onclick="removeFromQueue(${i})" style="background:none;border:none;color:var(--red);cursor:pointer;padding:5px">✕</button></li>`).join('');
      document.getElementById('q-list-mob').innerHTML = html;
      document.getElementById('q-list-side').innerHTML = html;
      document.getElementById('start-btn').style.display = (state.queue.length >= (state.match ? 1 : 2)) ? 'block' : 'none';
    }

    function removeFromQueue(i) {
      state.queue.splice(i, 1);
      updateStorage();
    }

    function startMatch() {
      if(!state.match) { 
        state.match = {p1:state.queue[0], p2:state.queue[1], s1:0, s2:0}; 
        state.queue.splice(0,2); 
      } else { 
        state.match = {p1:state.match.p1, p2:state.queue[0], s1:0, s2:0}; 
        state.queue.splice(0,1); 
      }
      updateStorage();
    }

    function renderMatch() {
      const nm = document.getElementById('no-match'), ma = document.getElementById('match-active');
      if(!state.match) { nm.style.display='block'; ma.style.display='none'; return; }
      nm.style.display='none'; ma.style.display='block';
      document.getElementById('p1name').textContent = state.match.p1;
      document.getElementById('p2name').textContent = state.match.p2;
      document.getElementById('p1score').textContent = state.match.s1;
      document.getElementById('p2score').textContent = state.match.s2;
      document.getElementById('p1score').className = 'score-num' + (state.match.s1 > state.match.s2 ? ' leading' : '');
      document.getElementById('p2score').className = 'score-num' + (state.match.s2 > state.match.s1 ? ' leading' : '');
    }

    function handlePoint(p) {
      state.lastAction = JSON.parse(JSON.stringify(state.match));
      if(p===0) state.match.s1++; else state.match.s2++;
      
      if(state.match.s1 >= 5 || state.match.s2 >= 5) {
        const win = state.match.s1 > state.match.s2 ? state.match.p1 : state.match.p2;
        const los = state.match.s1 > state.match.s2 ? state.match.p2 : state.match.p1;
        state.history.unshift({win, score:`${state.match.s1}x${state.match.s2}`});
        if(!state.ranking[win]) state.ranking[win]={w:0,d:0}; if(!state.ranking[los]) state.ranking[los]={w:0,d:0};
        state.ranking[win].w++; state.ranking[los].d++;
        
        document.getElementById('win-name').textContent = win;
        document.getElementById('win-score').textContent = `VITÓRIA POR ${state.match.s1} x ${state.match.s2}`;
        document.getElementById('winner-modal').style.display='block';
        document.getElementById('overlay').style.display='block';
        
        state.match = {p1: win, p2: '...', s1:0, s2:0};
      }
      updateStorage();
    }

    function undo() { if(state.lastAction) { state.match = state.lastAction; state.lastAction = null; updateStorage(); } }
    
    function closeWinner() { 
      document.getElementById('winner-modal').style.display='none'; 
      document.getElementById('overlay').style.display='none'; 
      if(state.queue.length) startMatch(); else { state.match = null; updateStorage(); } 
    }

    function cancelMatch() { if(confirm("Cancelar?")) { state.match = null; updateStorage(); } }
    
    function resetDay() { if(confirm("Zerar tudo?")) { state = {queue:[],match:null,ranking:{},history:[]}; updateStorage(); } }

    function renderRanking() {
      const sorted = Object.keys(state.ranking).sort((a,b) => state.ranking[b].w - state.ranking[a].w);
      document.getElementById('rank-body').innerHTML = sorted.map((n, i) => `<tr><td>${i+1}º</td><td><b>${n}</b></td><td>${state.ranking[n].w}V - ${state.ranking[n].d}D</td></tr>`).join('') || '<tr><td style="color:var(--muted);text-align:center;padding:20px">Sem dados</td></tr>';
    }
  </script>
</body>
</html>
